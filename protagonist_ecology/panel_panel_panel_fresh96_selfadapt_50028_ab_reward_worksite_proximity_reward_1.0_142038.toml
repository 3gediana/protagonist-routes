# Layer 8 R1 (FINAL_BLUEPRINT.md ?8.1): Lamarckian Hebbian online weight
# adaptation for background NeatBrain. Off by default; smoke test = on.
[evolution.lamarckian]
enabled = true
learning_rate = 0.0008
reward_threshold = 0.05

[evolution.neat]
add_node_rate = 0.04
add_connection_rate = 0.10
toggle_connection_rate = 0.02
add_modulatory_rate = 0.005
# P1 self-adaptive species threshold: compatibility_threshold is no longer a
# hand-tuned knob. The background-species NEAT auto-adjusts it every generation
# toward target_species_count (bounded by the min/max below). The 3.0 initial
# seed comes from the binary's built-in default; agents should NOT tune it.
target_species_count = 10
compatibility_threshold_adjustment_rate = 0.1
compatibility_threshold_min = 0.5
compatibility_threshold_max = 10.0

[evolution.selection]
elite_ratio = 0.20
tournament_size = 3

[evolution.mutation]
# P0 self-adaptive mutation: each protagonist genome carries its own mutation
# step-size (sigma) that co-evolves with its weights (Schwefel/Beyer
# self-adaptive ES). This replaces the old hand-tuned weight_perturb_sigma /
# weight_perturb_rate / weight_reset_rate (here) and line_sigma / mutation_boost
# (under [evolution.me_neat]); agents no longer tune any of them.
self_adaptive = true
initial_sigma = 0.10
sigma_learning_rate = 0.05
sigma_min = 0.001
sigma_max = 2.0

[trace]
enabled = true
events_enabled = false
agents_enabled = true
world_enabled = true
agent_interval = 20            # was 10; halved sample rate to control 60-gen disk
world_interval = 20            # was 10; halved sample rate
# 2026-05-28 disk-budget rollback: was 60 which produced ~90 GB
# event_trace.jsonl per run (60 gen x 2 ep x ~750 MB each). harmony_check
# only reads CSVs, not event_trace, so dropping back to 4 gens of trace
# preserves diagnostic value while staying within the D-044 budget.
max_generations = 20
tail_generations = 20
max_episodes_per_generation = 1
# 2026-05-28 disk-budget per-file cap (parity with D-044 CSV 200 MB caps).
# TraceRecorder will close streams that cross this threshold and emit a
# single LOG_WARN. Safety net against future runs that re-introduce a
# large `max_generations` value.
max_bytes_per_file = 209715200  # 200 MB
# Layer 7 R1: viewer frame JSON dumper for Godot/raylib viewer.
viewer_frames_enabled = true
viewer_frame_interval = 80     # was 40; halve frame rate, 60-gen still ~7300 frames

# Layer 5 reward paradigm shift (FINAL_BLUEPRINT.md ?5.4):
# - drop generic survival_weight 1.0 -> 0.3 (don't reward "didn't die" by itself)
# - drop food_weight 10.0 -> 3.0 (food only gets meaningful reward via drive penalty)
# - keep drive_weight=5.0 (homeostatic deltas remain primary signal)
# - boost worksite_completion_reward 60 -> 150 (build is a high-tier achievement)
# - boost cooperation/communication (joint_hunt 8 -> 18, signal_co 0.6 -> 1.5)
# Net effect: agents that "miracle survive" (idle alive) get less reward than
# those who actually build/reproduce/cooperate.
[reward]
drive_weight = 5.0
outcome_weight = 0.20
drive_thirst_from_hydration = true
survival_weight = 0.3                    # was 1.0 (Layer 5 shift)
food_weight = 3.0                        # was 10.0
intrinsic_weight = 4.0
combat_weight = 1.0
cooperation_weight = 12.0                # was 6.0
communication_weight = 8.0               # was 4.0
worksite_proximity_reward = 1.0         # was 0.05
worksite_completion_reward = 150.0       # was 60.0 (Layer 5: building is core achievement)
storage_deposit_reward = 1.5             # NEW: paid per resource deposited into completed Storage building
