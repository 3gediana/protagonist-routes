# ME-NEAT 3D BD from v17.
[evolution.me_neat]
# 2D BD AB: revert v17 hunt axis to verify 3D BD (8x8x3=192 cells) caused
# the curse-of-dimensionality coverage collapse seen in long_run_60gen
# (`tmp/layer1/long_run_60gen.toml`, me_cov 0.5-3% / 192). v16 ran 25
# cells (5x5x1) and reached me_cov 20% = 5 cells by gen 30. This config
# matches v16's archive geometry (chops_bin=5, workcraft_bin=1, max_bins=5)
# while keeping reproduction + Lamarckian + must_build all-on.
