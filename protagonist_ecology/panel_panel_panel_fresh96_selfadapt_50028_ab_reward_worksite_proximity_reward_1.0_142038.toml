# layer1.toml
#
# Layer 1 (Final Blueprint) integration smoke test - 30 gen.
#
# Changes vs v17_hunt_bd.toml baseline:
#   - World 200x200 -> 600x600 (9x area, per user 2026-05-23 hard constraint)
#   - Resources 84 -> 540, trees 14 -> 80, worksites 2 -> 8,
#     campfires 2 -> 8, water sources 2 -> 8 (scaled with area, but
#     density slightly reduced to keep total entity count manageable)
#   - Background species pop scaled 1.5x (45 -> 65)
#   - DayNightLayer (TimeOfDayLayer) enabled - already default but
#     made explicit
#   - SurvivalStatusLayer track_all_living=true (R-001) - uses default
#     ctor args, no toml override needed since SurvivalConfig doesn't
#     expose these yet (Layer 3 will add toml hooks if needed).
#
# Inherits reward block from v17 (intentional - Layer 1 is about
# environment realism, not reward paradigm. Reward paradigm shift is
# Layer 5).
#
# Hypothesis (validation criteria):
#   1. Binary runs to completion (no crash from Layer 1 additions)
#   2. core_temperature_ stays bounded (no NaN, mostly 25-45 deg C
#      under default coefficients)
#   3. Hunger damage and thermal damage trigger occasionally
#      (visible in SurvivalStatus log: extra deaths from these paths)
#   4. Background species don't all die in episode 0 (hydration_decay
#      = 0 for them by default, so they should survive normally)
#   5. World 600x600 doesn't slow training to a crawl (target: similar
#      or slightly slower per-gen time vs v17 200x200)

[runtime]
random_seed = 50028
log_level = "info"
preview_ticks = 1
world_role = "train"
scenario_name = "onepot_sD_fresh96_selfadapt_50028_ab_reward_worksite_proximity_reward_1.0"
# One-pot bloodline switch: warmstart from the completed sC 80-gen champion
# (resume_generation=80). action_dim is grown 13 -> 16 on load (new outputs
# zero-filled, behavior preserved) so phases D/E have reserved output slots
# and this checkpoint is reused instead of retrained from scratch.
# DISABLED-FOR-DEMO resume_checkpoint_path = "D:/claude-code/c++/routes/protagonist_ecology/runs/onepot_sD_warm_50024/20260607-131545/checkpoint_gen379"

# Stone bootstrap commit 1/2/3 end-to-end AB. Compared to
# long_run_60gen_2d_throw.toml (which has throw_attempt=-0.05 and
# curriculum=off), this run additionally turns on the curriculum
# persistence gate so the protagonist's NurseryProgressionLayer
# unlock flags (first_fire / worksite / stone / heavy / second_fire)
# survive across episode resets. Expected delta: stone deposit /
# completion events per gen should rise once the first protagonist
# crosses the 6-deposit threshold in episode 0, because subsequent
# episodes inherit "stone_unlocked=true" and start with stones
# already on the map.

[runtime.curriculum]
archetype_progression_persistence_enabled = true

# L6 R3 stage 3 commits A-K: full graduation pipeline.
# - triple_world.enabled: turn on the three-world topology
# - borderland_to_main_period_gens: every 10 gen, promote top-K out
#   of borderland into main world
# - borderland_max_pool_per_archetype: cap each archetype's
#   borderland pool to 32
# - borderland_eval_period_gens: every gen, mini-tick eval the
#   archetype's pool to refresh fitness
# - borderland_min_continuity_gens: require 5 eval rounds before
#   a genome can graduate to main world
# - borderland_mutate_sigma + rates: sandbox-NEAT-aligned weight
#   mutation between eval rounds so the pool actually evolves
# - extinction_rescue_top_k: if main_world archetype goes extinct,
#   pull top-2 from borderland to reseed
[runtime.triple_world]
# L6 R3 stage 4: persistent main-world host (PRODUCTION_WORLD_LIFECYCLE_SPEC
# invariant #1, "MainWorld bu reset dan nei cun zhong"). The host owns one
# World2D that is NEVER recreated across generations. Each generation tail
# the runtime ticks it by ticks_per_generation * tick_dt_seconds of sim time.
# Disk persistence of the host's World2D state is OUT of scope (spec sec 6
# priority 3, deferred); only the in-memory world is exercised here.
main_world_continuous_tick_enabled = true
main_world_tick_dt_seconds = 1.0
main_world_ticks_per_generation = 10
enabled = true
top_k_protagonist_per_gen = 4
top_k_background_per_gen = 2
borderland_to_main_period_gens = 10
borderland_to_main_top_k_protagonist = 8
borderland_to_main_top_k_background = 4
borderland_max_pool_per_archetype = 32
borderland_eval_period_gens = 1
borderland_eval_aging_factor = 1.0
borderland_min_continuity_gens = 5
borderland_mutate_sigma = 0.01
borderland_mutate_perturb_rate = 0.8
borderland_mutate_reset_rate = 0.05
extinction_rescue_top_k = 2

[output]
runs_dir = "runs/panel_fresh96_selfadapt_50028_ab_reward_worksite_proximity_reward_1.0"

