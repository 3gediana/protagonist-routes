<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Deep Protagonist — 3D Replay Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #070b12;
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; color: #e7ecf3; }
  #app { position: fixed; inset: 0; }
  canvas { display: block; }

  #loading { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 14px; background: #070b12; z-index: 50; }
  #loading .bar { width: 300px; height: 6px; background: #1c2330; border-radius: 3px; overflow: hidden; }
  #loading .bar > i { display: block; height: 100%; width: 0%; background: linear-gradient(90deg,#3aa0ff,#48e0a0); transition: width .2s; }
  #loading .pct { font-variant-numeric: tabular-nums; color: #9fb0c4; font-size: 13px; }

  /* HUD top-left */
  #hud { position: fixed; top: 12px; left: 12px; z-index: 20; padding: 10px 14px;
    background: rgba(10,14,22,.62); border: 1px solid rgba(120,150,190,.18); border-radius: 10px;
    backdrop-filter: blur(6px); min-width: 250px; }
  #hud .clock { font-size: 24px; font-weight: 650; font-variant-numeric: tabular-nums; letter-spacing: .5px; }
  #hud .row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; font-size: 12.5px; color: #b9c6d6; }
  #hud .chip { padding: 2px 8px; border-radius: 999px; background: rgba(120,150,190,.14); }
  #hud .chip b { color: #fff; font-weight: 600; }

  /* vitals bars */
  #vitals { position: fixed; top: 12px; right: 12px; z-index: 20; width: 230px;
    padding: 10px 12px; background: rgba(10,14,22,.6); border: 1px solid rgba(120,150,190,.18);
    border-radius: 10px; font-size: 12px; }
  #vitals h4 { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #6f8298; margin-bottom: 6px; }
  #vitals .v { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
  #vitals .v span { width: 58px; color: #aeb9c8; }
  #vitals .v .track { flex: 1; height: 8px; background: #1a2230; border-radius: 4px; overflow: hidden; }
  #vitals .v .track > i { display: block; height: 100%; width: 50%; border-radius: 4px; }
  #vitals .dead { color: #ff6b6b; font-weight: 700; display: none; margin-top: 6px; }

  /* bottom control bar */
  #bar { position: fixed; left: 50%; bottom: 14px; transform: translateX(-50%); z-index: 30;
    display: flex; align-items: center; gap: 10px; padding: 8px 12px; max-width: 94vw;
    background: rgba(10,14,22,.72); border: 1px solid rgba(120,150,190,.2); border-radius: 12px; backdrop-filter: blur(8px); }
  #bar button { cursor: pointer; border: 1px solid rgba(140,170,210,.25); background: #18202e; color: #dfe7f1;
    border-radius: 8px; padding: 6px 10px; font-size: 13px; }
  #bar button:hover { background: #212c3d; }
  #bar button.on { background: #2b6fb0; border-color: #3aa0ff; color: #fff; }
  #seek { width: 320px; max-width: 40vw; cursor: pointer; }
  #tlabel { font-size: 12px; color: #9fb0c4; font-variant-numeric: tabular-nums; min-width: 104px; text-align: center; }
  .speeds button { padding: 5px 7px; font-size: 12px; }
  .sep { width: 1px; align-self: stretch; background: rgba(120,150,190,.2); margin: 0 2px; }

  /* layer toggles */
  #layers { position: fixed; left: 12px; bottom: 14px; z-index: 30; display: flex; flex-direction: column; gap: 4px;
    padding: 8px 10px; background: rgba(10,14,22,.6); border: 1px solid rgba(120,150,190,.18); border-radius: 10px; }
  #layers h4 { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #6f8298; margin-bottom: 3px; }
  #layers label { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #cdd8e6; cursor: pointer; }
  #legend { position: fixed; right: 12px; bottom: 14px; z-index: 30; padding: 8px 10px;
    background: rgba(10,14,22,.6); border: 1px solid rgba(120,150,190,.18); border-radius: 10px; font-size: 11.5px; }
  #legend h4 { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #6f8298; margin-bottom: 4px; }
  #legend .sp { display: flex; align-items: center; gap: 6px; margin: 1px 0; }
  #legend .sw { width: 10px; height: 10px; border-radius: 3px; display: inline-block; }
</style>
</head>
<body>
  <div id="app"></div>

  <div id="loading">
    <div class="pct" id="loadpct">loading world…</div>
    <div class="bar"><i id="loadbar"></i></div>
  </div>

  <div id="hud">
    <div class="clock" id="clock">--:--</div>
    <div class="row">
      <span class="chip">Tick <b id="tickNum">—</b></span>
      <span class="chip" id="phaseChip">Phase <b>—</b></span>
    </div>
    <div class="row">
      <span class="chip">Animals <b id="animalCount">—</b></span>
      <span class="chip" id="caveChip">In&nbsp;cave <b>no</b></span>
    </div>
  </div>

  <div id="vitals">
    <h4>Protagonist vitals</h4>
    <div class="v"><span>Hunger</span><div class="track"><i id="vHunger" style="background:#e8a13a"></i></div></div>
    <div class="v"><span>Thirst</span><div class="track"><i id="vThirst" style="background:#3aa0ff"></i></div></div>
    <div class="v"><span>Stamina</span><div class="track"><i id="vStamina" style="background:#48e0a0"></i></div></div>
    <div class="v"><span>Protein</span><div class="track"><i id="vProtein" style="background:#d65b8a"></i></div></div>
    <div class="v"><span>Vitamin</span><div class="track"><i id="vVitamin" style="background:#b88af0"></i></div></div>
    <div class="dead" id="deadMsg">✖ agent died</div>
  </div>

  <div id="layers">
    <h4>Layers</h4>
    <label><input type="checkbox" data-layer="terrain" checked> Terrain</label>
    <label><input type="checkbox" data-layer="grass" checked> Grass</label>
    <label><input type="checkbox" data-layer="decos" checked> Trees / rocks</label>
    <label><input type="checkbox" data-layer="plants" checked> Plants (food)</label>
    <label><input type="checkbox" data-layer="resources" checked> Resources</label>
    <label><input type="checkbox" data-layer="animals" checked> Animals</label>
    <label><input type="checkbox" data-layer="agent" checked> Protagonist</label>
    <label><input type="checkbox" data-layer="builds" checked> Buildings / sites</label>
    <label><input type="checkbox" data-layer="farm" checked> Farm plots</label>
    <label><input type="checkbox" data-layer="fire" checked> Campfires</label>
    <label><input type="checkbox" data-layer="caves" checked> Caves</label>
    <label><input type="checkbox" data-layer="daynight" checked> Day / night</label>
  </div>

  <div id="legend">
    <h4>Animals</h4>
    <div class="sp"><i class="sw" style="background:#f0f0f0"></i> Rabbit</div>
    <div class="sp"><i class="sw" style="background:#a06e3c"></i> Deer</div>
    <div class="sp"><i class="sw" style="background:#5a5a64"></i> Wolf</div>
    <div class="sp"><i class="sw" style="background:#78b4dc"></i> Fish</div>
    <div class="sp"><i class="sw" style="background:#3c3228"></i> Eagle</div>
  </div>

  <div id="bar">
    <button id="play">⏸ Pause</button>
    <span class="sep"></span>
    <input type="range" id="seek" min="0" max="100" value="0" />
    <span id="tlabel">0 / 0</span>
    <span class="sep"></span>
    <span class="speeds">
      <button data-spd="0.5">0.5×</button>
      <button data-spd="1" class="on">1×</button>
      <button data-spd="2">2×</button>
      <button data-spd="4">4×</button>
    </span>
  </div>

  <script type="importmap">
  { "imports": { "three": "./vendor/three.module.js", "three/addons/": "./vendor/" } }
  </script>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
